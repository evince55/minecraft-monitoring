---
# kube-prometheus-stack values for k3s homelab
kube-prometheus-stack:
  # CRDs are already installed — disable the subchart for ArgoCD
  crds:
    enabled: false

  # Disable admission webhooks to avoid TLS cert issues on single-node
  prometheusOperator:
    admissionWebhooks:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
      limits:
        cpu: 200m
        memory: 200Mi
    tls:
      enabled: false

  # Prometheus configuration
  prometheus:
    prometheusSpec:
      routePrefix: /prometheus
      externalUrl: http://192.168.1.192/prometheus
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi
      configReloaders:
        enabled: true
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
      initConfigReloaderResources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
      retention: 7d
      retentionSize: 8GB
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false

  # AlertManager config
  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 50m
          memory: 50Mi
        limits:
          cpu: 100m
          memory: 100Mi
      configReloaders:
        enabled: true
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi
      alertmanagerConfigSelector:
        matchLabels:
          app: kube-prometheus-stack
          release: monitoring
      alertmanagerConfigNamespaceSelector: {}
      alertmanagerConfigMatcherStrategy:
        type: None

  # Grafana config
  grafana:
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 200m
        memory: 1Gi
    initChownData:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
    sidecar:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 128Mi
      dashboards:
        enabled: true
        label: grafana_dashboard
      datasources:
        enabled: true
        label: grafana_datasource
        additionalDataSources:
          - name: Prometheus
            type: prometheus
            uid: prometheus
            url: http://monitoring-kube-prometheus-prometheus.monitoring:9090/prometheus/
            access: proxy
            isDefault: true
            jsonData:
              httpMethod: POST
              timeInterval: 30s
    sidecarResources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 64Mi
    admin:
      existingSecret: grafana-admin-credentials
      userKey: admin-user
      passwordKey: admin-password
    persistence:
      enabled: true
      storageClassName: local-path
      size: 2Gi
    grafana.ini:
      server:
        domain: "192.168.1.192"
        root_url: "http://192.168.1.192/grafana/"
        serve_from_sub_path: true
      auth:
        login_maximum_inactive_lifetime_duration: "7d"
        login_maximum_lifetime_duration: "30d"

  # k3s does not run etcd
  kubeEtcd:
    enabled: false

  # k3s kube-proxy metrics bound to 127.0.0.1
  kubeProxy:
    enabled: false

  kubeScheduler:
    enabled: false

  kubeControllerManager:
    enabled: false

  kubelet:
    enabled: true
    serviceMonitor:
      jobLabel: k8s-app
      https: true
      cAdvisor: true
      probes: true
      resource: true
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum)
          action: drop

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  kube-state-metrics:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  defaultRules:
    create: true
    rules:
      etcd: false
      kubeScheduler: false
      kubeControllerManager: false
      kubeProxy: false
