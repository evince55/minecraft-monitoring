apiVersion: v1
kind: Service
metadata:
  name: kubelet
  namespace: kube-system
  labels:
    k8s-app: kubelet
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: https-metrics
      port: 10250
      protocol: TCP
      targetPort: 10250
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kubelet
  namespace: kube-system
  labels:
    k8s-app: kubelet
subsets:
  - addresses:
      - ip: 192.168.1.192
    ports:
      - name: https-metrics
        port: 10250
        protocol: TCP
