---
# 1. Minecraft metrics Service
apiVersion: v1
kind: Service
metadata:
  name: minecraft-metrics
  namespace: default
  labels:
    app: minecraft
spec:
  ports:
    - name: jmx-metrics
      port: 5556
      targetPort: 5556
  selector:
    app: minecraft
---
# 2. ServiceMonitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: minecraft
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  jobLabel: minecraft-metrics
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: minecraft
  endpoints:
    - port: jmx-metrics
      interval: 30s
      path: /metrics
