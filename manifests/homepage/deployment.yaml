---
# Homepage deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app: homepage
spec:
  replicas: 0  # PARKED 2026-07-07: RO configMap mount at /app/config crashloops (EROFS). Working homepage still serves from default ns. Finish migration (writable vol + ported config) before scaling back up.
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v0.9.4
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: homepage-config
---
# Homepage service
apiVersion: v1
kind: Service
metadata:
  name: homepage-service
  namespace: homepage
  labels:
    app: homepage
spec:
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: homepage
