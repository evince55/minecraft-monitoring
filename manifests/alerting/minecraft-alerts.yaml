apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: minecraft-alerts
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: monitoring
spec:
  groups:
    - name: minecraft.rules
      rules:
        - alert: MinecraftServerDown
          expr: up{job="minecraft-metrics"} == 0
          for: 1m
          labels:
            severity: critical
            namespace: monitoring
          annotations:
            summary: "Minecraft server is down"
            description: "The Minecraft metrics exporter has been unreachable for 1 minute."
        - alert: LowTPS
          expr: rate(minecraft_tps_bucket_sum[1m]) / rate(minecraft_tps_bucket_count[1m]) < 15
          for: 5m
          labels:
            severity: warning
            namespace: monitoring
          annotations:
            summary: "Low TPS detected"
            description: "Server TPS has been below 15 for 5 minutes (current: {{ $value }})."
        - alert: CriticalTPS
          expr: rate(minecraft_tps_bucket_sum[1m]) / rate(minecraft_tps_bucket_count[1m]) < 10
          for: 3m
          labels:
            severity: critical
            namespace: monitoring
          annotations:
            summary: "Critical TPS detected"
            description: "Server TPS has been below 10 for 3 minutes (current: {{ $value }})."
        - alert: HighHeapUsage
          expr: java_lang_Memory_HeapMemoryUsage_used / java_lang_Memory_HeapMemoryUsage_max > 0.85
          for: 5m
          labels:
            severity: warning
            namespace: monitoring
          annotations:
            summary: "High JVM heap usage"
            description: "JVM heap usage has been above 85% for 5 minutes (current: {{ $value | humanizePercentage }})."
        - alert: HighHeapUsageCritical
          expr: java_lang_Memory_HeapMemoryUsage_used / java_lang_Memory_HeapMemoryUsage_max > 0.95
          for: 2m
          labels:
            severity: critical
            namespace: monitoring
          annotations:
            summary: "Critical JVM heap usage"
            description: "JVM heap usage has been above 95% for 2 minutes (current: {{ $value | humanizePercentage }})."
        - alert: HighSystemLoad
          expr: java_lang_OperatingSystem_SystemLoadAverage > 6
          for: 5m
          labels:
            severity: warning
            namespace: monitoring
          annotations:
            summary: "High system load average"
            description: "System load average has been above 6 for 5 minutes (current: {{ $value }})."
        - alert: NoPlayersOnline
          expr: sum(minecraft_player_online) == 0
          for: 30m
          labels:
            severity: info
            namespace: monitoring
          annotations:
            summary: "No players online"
            description: "No players have been online for 30 minutes."
