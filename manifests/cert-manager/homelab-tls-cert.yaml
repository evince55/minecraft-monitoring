apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-tls
  namespace: monitoring
spec:
  secretName: homelab-tls
  commonName: "192.168.1.192"
  dnsNames:
    - "192.168.1.192"
  issuerRef:
    name: selfsigned-cluster-issuer
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-tls
  namespace: argocd
spec:
  secretName: homelab-tls
  commonName: "192.168.1.192"
  dnsNames:
    - "192.168.1.192"
  issuerRef:
    name: selfsigned-cluster-issuer
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-tls
  namespace: default
spec:
  secretName: homelab-tls
  commonName: "192.168.1.192"
  dnsNames:
    - "192.168.1.192"
  issuerRef:
    name: selfsigned-cluster-issuer
    kind: ClusterIssuer
