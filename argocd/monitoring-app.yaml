apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:evince55/minecraft-monitoring.git
    path: helm/kube-prometheus-stack
    helm:
      valueFiles:
        - values.yaml
      skipCrds: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
