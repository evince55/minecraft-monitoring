# Promtail Helm values for k3s homelab
# Collects pod logs and ships them to Loki

# Loki gateway URL
config:
  clients:
    - url: http://loki-gateway.monitoring/loki/api/v1/push

  # Drop kube-system namespace logs to reduce noise
  snippets:
    extraRelabelConfigs:
      - source_labels:
          - __meta_kubernetes_namespace
        regex: kube-system
        action: drop

# Resource limits
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

# Tolerations already default to allow scheduling on control-plane nodes
# (the chart defaults include both master and control-plane taints)
