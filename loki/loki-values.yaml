# Loki Helm values for single-node k3s homelab
# Deployment mode: SingleBinary (simplest, no object storage needed)
#
# NOTE: This is a wrapper chart with dependency named "loki".
# Values under `loki:` are passed to the subchart's root values.
# Since the subchart itself has `loki:` at its values.yaml top level,
# we need an extra nesting level for subchart's loki config.
# Everything else (deploymentMode, singleBinary, gateway, etc.)
# goes directly under the parent's `loki:` key.

loki:
  # Subchart's `loki:` config section
  loki:
    auth_enabled: false
    storage:
      type: filesystem
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
        admin: loki-admin
    useTestSchema: true
    commonConfig:
      replication_factor: 1
    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      max_cache_freshness_per_query: 10m
      split_queries_by_interval: 15m
      query_timeout: 300s
      volume_enabled: true
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
    # The ruler keeps the original LogQL expressions and severity
    # labels from manifests/alerting/log-alerts.yaml, so the existing
    # AlertManager severity routing still applies. Without
    # `alertmanager_url` the ruler would evaluate the rules but never
    # push alerts anywhere.
    rulerConfig:
      alertmanager_url: http://kube-prometheus-stack-alertmanager.monitoring.svc:9093
      # Alertmanager >= 0.27 (shipped by kube-prometheus-stack 85.x) removed
      # the v1 alerts API — without v2 the ruler evaluates rules but every
      # notification POST 404s. (Carried over from the superseded PR #5 fix.)
      enable_alertmanager_v2: true
      enable_api: true
      storage:
        type: local
        local:
          directory: /etc/loki/rules
      wal:
        dir: /var/loki/ruler-wal
      # Keep evaluation intervals aligned with the `for:` durations
      # in the rules (the smallest is 5m) so an alert can transition
      # to Pending promptly after the threshold is crossed.
      evaluation_interval: 1m
      poll_interval: 1m

  deploymentMode: SingleBinary

  # SingleBinary configuration
  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 512Mi
    persistence:
      enabled: true
      size: 5Gi
      storageClassName: local-path

  # Gateway (nginx reverse proxy)
  gateway:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  # Disable SimpleScalable components (not needed for SingleBinary)
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

  # Retention: 7 days
  tableManager:
    retention_deletes_enabled: true
    retention_period: 168h

  # Disable caches (not needed for small install)
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

  # Loki canary (required by chart validation, minimal resources)
  lokiCanary:
    enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 20m
        memory: 64Mi

  # Monitoring
  monitoring:
    dashboards:
      enabled: true
      labels:
        grafana_dashboard: "1"
    serviceMonitor:
      enabled: true
      interval: 15s

  # LogQL alert evaluation.
  #
  # The four Minecraft log alerts in manifests/alerting/log-alerts.yaml
  # are LogQL, so they must be evaluated by Loki's embedded ruler —
  # not by Prometheus (promtool rejects |= / count_over_time over a
  # log stream with a parse error, so a PrometheusRule carrying them
  # never loads). We turn on the kiwigrid rules sidecar, point it at
  # /etc/loki/rules inside the SingleBinary pod, and have the ruler
  # read from the same path (see loki.loki.rulerConfig above). The
  # sidecar watches ConfigMaps labelled `loki_rule` in the
  # `monitoring` namespace, so the ConfigMap above is picked up
  # automatically and updates roll out without a Helm re-render.
  #
  # For severity-based routing to keep working, the ruler pushes its
  # alerts to the kube-prometheus-stack AlertManager. The
  # kube-prometheus-stack is installed by Argo CD with release name
  # "kube-prometheus-stack" in the `monitoring` namespace, so the
  # service is
  # `kube-prometheus-stack-alertmanager.monitoring.svc:9093`.
  sidecar:
    rules:
      enabled: true
      # Mount under the same path the loki ruler reads from, so the
      # sidecar-fed files and the ruler's local rule storage agree.
      folder: /etc/loki/rules
      # Default label is `loki_rule`; ConfigMaps in manifests/alerting
      # carry that label so the sidecar picks them up.
      label: loki_rule
      # Only watch the namespace loki is deployed in; no need to
      # chase ConfigMaps elsewhere on the cluster.
      searchNamespace:
        - monitoring
      # Only watch ConfigMaps — the rules live in ConfigMaps, not
      # Secrets.
      resource: configmap
      watchMethod: WATCH
